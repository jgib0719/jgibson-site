<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous User Tracking Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-4">Anonymous User Tracking Test</h1>
        
        <div class="mb-4">
            <h2 class="text-lg font-semibold mb-2">User ID:</h2>
            <div id="user-id" class="bg-gray-100 p-2 rounded font-mono text-sm"></div>
        </div>
        
        <div class="mb-4">
            <h2 class="text-lg font-semibold mb-2">User Stats:</h2>
            <div id="user-stats" class="bg-gray-100 p-2 rounded font-mono text-sm"></div>
        </div>
        
        <div class="mb-4">
            <h2 class="text-lg font-semibold mb-2">Progress Data:</h2>
            <div id="progress-data" class="bg-gray-100 p-2 rounded font-mono text-sm"></div>
        </div>
        
        <div class="mb-4">
            <h2 class="text-lg font-semibold mb-2">Actions:</h2>
            <button id="clear-data" class="bg-red-600 text-white px-4 py-2 rounded mr-2">Clear All Data</button>
            <button id="test-tracker" class="bg-blue-600 text-white px-4 py-2 rounded">Test Progress Tracker</button>
        </div>
        
        <div id="test-output" class="mt-4 p-2 bg-green-100 rounded hidden"></div>
    </div>

    <script>
        function getOrCreateUserId() {
            let userId = localStorage.getItem('ccna_user_id');
            if (!userId) {
                userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                localStorage.setItem('ccna_user_id', userId);
            }
            return userId;
        }

        function displayCurrentData() {
            const userId = getOrCreateUserId();
            document.getElementById('user-id').textContent = userId;
            
            const userStats = localStorage.getItem('ccna_user_stats');
            document.getElementById('user-stats').textContent = userStats || 'No stats found';
            
            const progressData = localStorage.getItem(`ccna_progress_${userId}`);
            document.getElementById('progress-data').textContent = progressData || 'No progress data';
        }

        function clearAllData() {
            const keys = Object.keys(localStorage);
            keys.forEach(key => {
                if (key.startsWith('ccna_')) {
                    localStorage.removeItem(key);
                }
            });
            displayCurrentData();
            alert('All CCNA data cleared');
        }

        function testProgressTracker() {
            try {
                // Test the basic user tracking system
                const userId = getOrCreateUserId();
                
                // Create fake progress data
                const testProgress = {
                    1: {'Network Components': true, 'Network Topologies': true},
                    2: {'Routing Concepts': true}
                };
                localStorage.setItem(`ccna_progress_${userId}`, JSON.stringify(testProgress));
                
                // Create test user stats
                const testStats = {
                    userId: userId,
                    firstVisit: new Date().toISOString(),
                    lastVisit: new Date().toISOString(),
                    totalSessions: 5,
                    totalTopicsCompleted: 3,
                    chaptersStarted: [1, 2],
                    timeSpent: 0
                };
                localStorage.setItem('ccna_user_stats', JSON.stringify(testStats));
                
                displayCurrentData();
                
                const output = document.getElementById('test-output');
                output.textContent = 'Test data created successfully! User tracking is working.';
                output.className = 'mt-4 p-2 bg-green-100 rounded';
                
            } catch (error) {
                const output = document.getElementById('test-output');
                output.textContent = 'Error: ' + error.message;
                output.className = 'mt-4 p-2 bg-red-100 rounded';
            }
        }

        document.getElementById('clear-data').addEventListener('click', clearAllData);
        document.getElementById('test-tracker').addEventListener('click', testProgressTracker);

        // Initialize display
        displayCurrentData();
    </script>
</body>
</html>
