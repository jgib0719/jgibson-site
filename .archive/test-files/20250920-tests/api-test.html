<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCNA Database API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-6">CCNA Database API Test</h1>
        
        <div class="space-y-6">
            <!-- Connection Test -->
            <div class="bg-slate-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4">Connection Test</h2>
                <button id="testConnection" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded">
                    Test Database Connection
                </button>
                <div id="connectionResult" class="mt-4 p-4 rounded bg-slate-700 hidden"></div>
            </div>

            <!-- Section Topics Test -->
            <div class="bg-slate-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4">Section Topics Test</h2>
                <button id="testSectionTopics" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded">
                    Load Section 1.0 Topics
                </button>
                <div id="sectionResult" class="mt-4 p-4 rounded bg-slate-700 hidden"></div>
            </div>

            <!-- Topic Content Test -->
            <div class="bg-slate-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4">Topic Content Test</h2>
                <button id="testTopicContent" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded">
                    Load Sample Topic Content
                </button>
                <div id="contentResult" class="mt-4 p-4 rounded bg-slate-700 hidden"></div>
            </div>

            <!-- Dynamic Card Generation Test -->
            <div class="bg-slate-800 rounded-lg p-6">
                <h2 class="text-xl font-semibold mb-4">Dynamic Card Generation Test</h2>
                <button id="testCardGeneration" class="bg-yellow-600 hover:bg-yellow-500 px-4 py-2 rounded">
                    Generate Sample Cards
                </button>
                <div id="cardResult" class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
            </div>
        </div>
    </div>

    <script>
        // Simple database API implementation for testing
        class TestDatabaseAPI {
            constructor() {
                this.apiUrl = '/api/database.php';
            }

            async executeQuery(query, params = []) {
                try {
                    const response = await fetch(this.apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ query, params })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }

                    const result = await response.json();
                    
                    if (!result.success) {
                        throw new Error(result.error || 'Query failed');
                    }

                    return result.data;
                } catch (error) {
                    console.error('Database query error:', error);
                    throw error;
                }
            }

            generateTopicCard(topic, subsectionNumber) {
                const colorMap = {
                    '1.1': 'bg-blue-900/50 border-blue-500/30',
                    '1.2': 'bg-purple-900/50 border-purple-500/30',
                    '1.3': 'bg-green-900/50 border-green-500/30'
                };
                const cardColor = colorMap[subsectionNumber] || 'bg-slate-900/50 border-slate-500/30';

                return `
                    <div class="topic-card ${cardColor} border rounded-lg p-4 hover:border-opacity-60 transition-all duration-300">
                        <div class="flex items-start justify-between mb-3">
                            <h3 class="text-lg font-semibold text-slate-200 leading-tight">${topic.title.replace(' - CCNA 200-301 Guide', '')}</h3>
                            <span class="text-xs px-2 py-1 rounded bg-slate-700 text-slate-300">${topic.difficulty_level}</span>
                        </div>
                        <div class="visual-container mb-3 h-20 flex items-center justify-center bg-slate-800/30 rounded">
                            <div class="text-slate-500 text-sm">Visual Diagram</div>
                        </div>
                        <p class="text-sm text-slate-300 leading-relaxed">${topic.description}</p>
                        <div class="mt-3 pt-3 border-t border-slate-700/50">
                            <div class="flex items-center justify-between text-xs text-slate-400">
                                <span>Section ${subsectionNumber}</span>
                                <span>${topic.estimated_time_minutes}min</span>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        const api = new TestDatabaseAPI();

        // Test connection
        document.getElementById('testConnection').addEventListener('click', async () => {
            const resultDiv = document.getElementById('connectionResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="text-yellow-400">Testing connection...</div>';

            try {
                const result = await api.executeQuery('SELECT COUNT(*) as count FROM topics');
                resultDiv.innerHTML = `
                    <div class="text-green-400">✅ Connection successful!</div>
                    <div class="text-slate-300 mt-2">Total topics in database: ${result[0].count}</div>
                `;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-400">❌ Connection failed:</div>
                    <div class="text-slate-300 mt-2">${error.message}</div>
                `;
            }
        });

        // Test section topics
        document.getElementById('testSectionTopics').addEventListener('click', async () => {
            const resultDiv = document.getElementById('sectionResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="text-yellow-400">Loading section topics...</div>';

            try {
                const result = await api.executeQuery(`
                    SELECT s.subsection_number, s.title as subsection_title, COUNT(t.id) as topic_count 
                    FROM subsections s 
                    LEFT JOIN topics t ON s.id = t.subsection_id 
                    JOIN sections sec ON s.section_id = sec.id 
                    WHERE sec.section_number = ?
                    GROUP BY s.id 
                    ORDER BY s.order_index
                `, ['1.0']);

                let html = '<div class="text-green-400">✅ Section 1.0 loaded successfully!</div><div class="mt-4 space-y-2">';
                result.forEach(row => {
                    html += `<div class="flex justify-between">
                        <span>${row.subsection_number}: ${row.subsection_title}</span>
                        <span class="text-slate-400">${row.topic_count} topics</span>
                    </div>`;
                });
                html += '</div>';
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-400">❌ Failed to load section topics:</div>
                    <div class="text-slate-300 mt-2">${error.message}</div>
                `;
            }
        });

        // Test topic content
        document.getElementById('testTopicContent').addEventListener('click', async () => {
            const resultDiv = document.getElementById('contentResult');
            resultDiv.classList.remove('hidden');
            resultDiv.innerHTML = '<div class="text-yellow-400">Loading topic content...</div>';

            try {
                const result = await api.executeQuery(`
                    SELECT title, description, principles_content, difficulty_level, estimated_time_minutes
                    FROM topics 
                    WHERE slug = ?
                `, ['routers']);

                if (result.length > 0) {
                    const topic = result[0];
                    resultDiv.innerHTML = `
                        <div class="text-green-400">✅ Topic content loaded!</div>
                        <div class="mt-4 space-y-3">
                            <div><strong>Title:</strong> ${topic.title}</div>
                            <div><strong>Description:</strong> ${topic.description}</div>
                            <div><strong>Difficulty:</strong> ${topic.difficulty_level}</div>
                            <div><strong>Time:</strong> ${topic.estimated_time_minutes} minutes</div>
                            <div><strong>Content Length:</strong> ${topic.principles_content ? topic.principles_content.length : 0} characters</div>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = '<div class="text-yellow-400">⚠️ No topic found with slug "routers"</div>';
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="text-red-400">❌ Failed to load topic content:</div>
                    <div class="text-slate-300 mt-2">${error.message}</div>
                `;
            }
        });

        // Test card generation
        document.getElementById('testCardGeneration').addEventListener('click', async () => {
            const resultDiv = document.getElementById('cardResult');
            resultDiv.innerHTML = '<div class="col-span-full text-yellow-400">Generating cards...</div>';

            try {
                const result = await api.executeQuery(`
                    SELECT t.title, t.slug, t.description, t.difficulty_level, t.estimated_time_minutes, s.subsection_number
                    FROM topics t
                    JOIN subsections s ON t.subsection_id = s.id
                    WHERE s.subsection_number IN ('1.1', '1.2', '1.3')
                    ORDER BY s.order_index, t.order_index
                    LIMIT 6
                `);

                let html = '';
                result.forEach(topic => {
                    html += api.generateTopicCard(topic, topic.subsection_number);
                });
                
                resultDiv.innerHTML = html;
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="col-span-full text-red-400">❌ Failed to generate cards:</div>
                    <div class="col-span-full text-slate-300 mt-2">${error.message}</div>
                `;
            }
        });
    </script>
</body>
</html>
