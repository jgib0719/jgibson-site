<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DB-Ready CCNA Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .option-btn:disabled {
            cursor: not-allowed;
        }
        .correct {
            background-color: #10B981 !important; /* Green-500 */
            color: white !important;
            border-color: #059669 !important; /* Green-600 */
        }
        .incorrect {
            background-color: #EF4444 !important; /* Red-500 */
            color: white !important;
            border-color: #DC2626 !important; /* Red-600 */
        }
        #loading-spinner {
            border-top-color: #3b82f6;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div id="quiz-container" class="w-full max-w-2xl bg-white p-6 sm:p-8 rounded-xl shadow-lg hidden">
        <div id="quiz-header" class="mb-6">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold text-gray-800">CCNA Practice Quiz</h1>
                <div id="score" class="text-lg font-semibold text-gray-700">Score: 0 / 0</div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div id="question-area">
            <!-- Question content will be dynamically inserted here -->
        </div>

        <div id="feedback-area" class="mt-4 p-4 rounded-lg bg-gray-50 text-gray-700 border border-gray-200 hidden">
            <!-- Feedback and explanation will be shown here -->
        </div>

        <div class="mt-6 flex justify-end">
            <button id="next-btn" class="bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow hover:bg-blue-700 transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed" disabled>Next</button>
        </div>
    </div>

    <div id="results-container" class="w-full max-w-2xl bg-white p-8 rounded-xl shadow-lg text-center hidden">
        <h2 class="text-3xl font-bold text-gray-800 mb-4">Quiz Complete!</h2>
        <p class="text-xl text-gray-600 mb-6">Your final score is:</p>
        <div id="final-score" class="text-5xl font-bold text-blue-600 mb-8"></div>
        <button id="restart-btn" class="bg-blue-600 text-white font-bold py-3 px-8 rounded-lg shadow hover:bg-blue-700 transition duration-300">Restart Quiz</button>
    </div>

    <div id="loading-container" class="text-center">
        <div id="loading-spinner" class="w-12 h-12 rounded-full border-4 border-gray-300 inline-block"></div>
        <p class="mt-4 text-gray-600">Loading Quiz...</p>
    </div>

    <script>
        // --- DATA LOADING ---
        // This section is now separated. To connect a database, 
        // you would replace the contents of this function with a `fetch` call to your API endpoint.
        async function loadQuizData() {
            // ** FOR DATABASE INTEGRATION **
            // 1. Comment out or remove the `hardcodedQuizData` array below.
            // 2. Uncomment the following lines and replace the URL.
            //
            // try {
            //     const response = await fetch('https://your-api.com/questions');
            //     if (!response.ok) {
            //         throw new Error(`HTTP error! status: ${response.status}`);
            //     }
            //     const data = await response.json();
            //     return data;
            // } catch (error) {
            //     console.error("Could not fetch quiz data:", error);
            //     // You could show an error message to the user here
            //     return []; // Return empty array on error
            // }

            // This is the hardcoded data, acting as a placeholder for your DB call.
            const hardcodedQuizData = [
                { question: "What is the sys-id-ext field in a BPDU used for?", options: ["It is a 4-bit field inserted into an Ethernet frame to define trunking information between switches.","It is a 12-bit field inserted into an Ethernet frame to define VLANs in an STP instance.","It is a 4-bit field inserted into an non-Ethernet frame to define EtherChannel options.","It is a 12-bit field inserted into an Ethernet frame to define STP root bridges."], answer: ["B"], explanation: "To allow PVST+ to operate, a 12-bit extended system ID (the VLAN ID) is inserted into the BPDU. This lets a root bridge be configured per-STP instance." },
                { question: "You have four RSTP PVST+ links between switches and want to aggregate the bandwidth. What solution will you use?", options: ["EtherChannel", "PortFast", "BPDU Channel", "VLANs", "EtherBundle"], answer: ["A"], explanation: "Cisco’s EtherChannel can bundle up to eight ports between switches to provide resiliency and more bandwidth." },
                { question: "What configuration parameters must be configured the same between switches for LACP to form a channel? (Choose three.)", options: ["Virtual MAC address", "Port speeds", "Duplex", "PortFast enabled", "Allowed VLAN information"], answer: ["B", "C", "E"], explanation: "For LACP to form a channel, speed, duplex, and allowed VLAN information must match on both sides." },
                { question: "Which command allows you to view the technology options and licenses that are supported on your router along with several status variables?", options: ["show license", "show license feature", "show license udi", "show version"], answer: ["B"], explanation: "`show license feature` displays technology package and feature licenses plus their activation status." },
                // ... All other questions would be here ...
                { question: "Which two AP modes can serve wireless traffic? (Choose two.)", options: ["Local", "Monitor", "Sniffer","FlexConnect"], answer: ["A", "D"], explanation: "The two AP modes listed that can serve wireless traffic are local and FlexConnect." }
            ];
            
            // Simulate a network delay, like a real API call would have
            return new Promise(resolve => {
                setTimeout(() => {
                    resolve(hardcodedQuizData);
                }, 500);
            });
        }


        // --- SCRIPT LOGIC (No changes needed below to connect a DB) ---
        const quizContainer = document.getElementById('quiz-container');
        const resultsContainer = document.getElementById('results-container');
        const loadingContainer = document.getElementById('loading-container');
        const questionArea = document.getElementById('question-area');
        const feedbackArea = document.getElementById('feedback-area');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const progressBar = document.getElementById('progress-bar');
        const nextBtn = document.getElementById('next-btn');
        const restartBtn = document.getElementById('restart-btn');

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let questionsAnswered = 0;
        let selectedAnswers = [];

        async function startQuiz() {
            loadingContainer.classList.remove('hidden');
            quizContainer.classList.add('hidden');
            resultsContainer.classList.add('hidden');
            
            quizData = await loadQuizData();
            
            loadingContainer.classList.add('hidden');

            if (!quizData || quizData.length === 0) {
                quizContainer.innerHTML = `<p class="text-center text-red-500">Failed to load quiz questions. Please try again later.</p>`;
                quizContainer.classList.remove('hidden');
                return;
            }

            // Shuffle the quiz data for a new order each time
            quizData.sort(() => Math.random() - 0.5);
            
            currentQuestionIndex = 0;
            score = 0;
            questionsAnswered = 0;
            quizContainer.classList.remove('hidden');
            updateScore();
            loadQuestion();
        }

        function loadQuestion() {
            selectedAnswers = [];
            feedbackArea.classList.add('hidden');
            nextBtn.disabled = true;

            const currentQuestion = quizData[currentQuestionIndex];
            
            const optionsHtml = currentQuestion.options.map((option, index) => {
                const optionLetter = String.fromCharCode(65 + index);
                return `
                    <button class="option-btn w-full text-left p-4 mb-3 bg-white border-2 border-gray-300 rounded-lg hover:bg-gray-100 hover:border-blue-500 transition duration-200" data-answer="${optionLetter}">
                        <span class="font-bold mr-3">${optionLetter}.</span> ${option}
                    </button>
                `;
            }).join('');

            questionArea.innerHTML = `
                <p class="text-lg text-gray-600 mb-2">Question ${currentQuestionIndex + 1} of ${quizData.length}</p>
                <h2 class="text-xl font-semibold text-gray-800 mb-5">${currentQuestion.question}</h2>
                <div id="options-container">
                    ${optionsHtml}
                </div>
            `;
            
            updateProgressBar();
            
            document.querySelectorAll('.option-btn').forEach(button => {
                button.addEventListener('click', handleOptionSelect);
            });
        }
        
        function handleOptionSelect(e) {
            const selectedBtn = e.currentTarget;
            const answer = selectedBtn.dataset.answer;
            const currentQuestion = quizData[currentQuestionIndex];
            const requiredAnswers = currentQuestion.answer.length;

            if (requiredAnswers > 1) {
                selectedBtn.classList.toggle('bg-blue-100');
                selectedBtn.classList.toggle('border-blue-500');
                if (selectedAnswers.includes(answer)) {
                    selectedAnswers = selectedAnswers.filter(a => a !== answer);
                } else {
                    selectedAnswers.push(answer);
                }
                
                if (document.getElementById('submit-multi-btn')) {
                    if (selectedAnswers.length === 0) {
                        document.getElementById('submit-multi-btn').remove();
                    }
                } else {
                    if (selectedAnswers.length > 0) {
                        const submitBtn = document.createElement('button');
                        submitBtn.id = 'submit-multi-btn';
                        submitBtn.textContent = 'Submit Answer';
                        submitBtn.className = 'bg-green-500 text-white font-bold py-2 px-4 rounded-lg mt-4 shadow hover:bg-green-600 transition';
                        document.getElementById('options-container').appendChild(submitBtn);
                        submitBtn.addEventListener('click', checkMultiAnswer);
                    }
                }
            } else {
                selectedAnswers = [answer];
                checkAnswer();
            }
        }
        
        function checkMultiAnswer() {
             const submitBtn = document.getElementById('submit-multi-btn');
             if(submitBtn) submitBtn.remove();
             checkAnswer();
        }

        function checkAnswer() {
            questionsAnswered++;
            const currentQuestion = quizData[currentQuestionIndex];
            const correctAnswers = currentQuestion.answer.sort();
            const userAnswers = selectedAnswers.sort();

            const isCorrect = JSON.stringify(correctAnswers) === JSON.stringify(userAnswers);

            if (isCorrect) {
                score++;
            }
            
            feedbackArea.innerHTML = `
                <h3 class="font-bold text-lg mb-2">${isCorrect ? 'Correct!' : 'Incorrect.'}</h3>
                <p><span class="font-semibold">Explanation:</span> ${currentQuestion.explanation}</p>
            `;
            feedbackArea.classList.remove('hidden');
            feedbackArea.classList.toggle('bg-green-100', isCorrect);
            feedbackArea.classList.toggle('border-green-300', isCorrect);
            feedbackArea.classList.toggle('text-green-800', isCorrect);
            feedbackArea.classList.toggle('bg-red-100', !isCorrect);
            feedbackArea.classList.toggle('border-red-300', !isCorrect);
            feedbackArea.classList.toggle('text-red-800', !isCorrect);

            document.querySelectorAll('.option-btn').forEach(btn => {
                const btnAnswer = btn.dataset.answer;
                if (correctAnswers.includes(btnAnswer)) {
                    btn.classList.add('correct');
                } else if (userAnswers.includes(btnAnswer)) {
                    btn.classList.add('incorrect');
                }
                btn.disabled = true;
            });
            
            updateScore();
            nextBtn.disabled = false;
            nextBtn.focus();
        }

        function updateScore() {
            scoreEl.textContent = `Score: ${score} / ${questionsAnswered}`;
        }
        
        function updateProgressBar() {
            const progress = ((currentQuestionIndex) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
        }
        
        function showResults() {
            quizContainer.classList.add('hidden');
            resultsContainer.classList.remove('hidden');
            const percentage = quizData.length > 0 ? Math.round((score / quizData.length) * 100) : 0;
            finalScoreEl.innerHTML = `${score} / ${quizData.length} <span class="block text-3xl text-gray-500 mt-2">(${percentage}%)</span>`;
        }

        nextBtn.addEventListener('click', () => {
            currentQuestionIndex++;
            updateProgressBar();
            if (currentQuestionIndex < quizData.length) {
                loadQuestion();
            } else {
                setTimeout(showResults, 500);
            }
        });
        
        restartBtn.addEventListener('click', startQuiz);
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !nextBtn.disabled) {
                nextBtn.click();
            }
        });

        // Initial call to start the quiz
        startQuiz();
    </script>
</body>
</html>
