<!DOCTYPE html>
<html>
<head>
    <title>Debug Progress Data</title>
</head>
<body>
    <h1>Progress Debug</h1>
    <button onclick="checkProgress()">Check Progress Data</button>
    <pre id="output"></pre>

    <script>
        function checkProgress() {
            const output = document.getElementById('output');
            let debug = '';
            
            // Check all localStorage keys
            debug += 'All localStorage keys:\n';
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                debug += `  ${key}\n`;
            }
            debug += '\n';
            
            // Check CCNA progress data
            const keys = Object.keys(localStorage).filter(key => key.includes('ccna'));
            debug += 'CCNA-related keys:\n';
            keys.forEach(key => {
                debug += `\nKey: ${key}\n`;
                const data = JSON.parse(localStorage.getItem(key) || '{}');
                debug += `Data: ${JSON.stringify(data, null, 2)}\n`;
            });
            
            output.textContent = debug;
        }
    </script>
</body>
</html>
